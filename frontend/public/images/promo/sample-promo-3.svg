<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1" />
    </linearGradient>
    <pattern id="vietnamPattern" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect width="40" height="40" fill="rgba(255,255,255,0.05)"/>
      <path d="M20 5 L25 15 L35 15 L27 23 L30 33 L20 27 L10 33 L13 23 L5 15 L15 15 Z" fill="rgba(255,255,255,0.1)"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGradient3)"/>
  
  <!-- Vietnam pattern overlay -->
  <rect width="800" height="400" fill="url(#vietnamPattern)"/>
  
  <!-- Vietnam flag colors accent -->
  <rect x="0" y="0" width="800" height="30" fill="#DA020E"/>
  <rect x="0" y="370" width="800" height="30" fill="#DA020E"/>
  
  <!-- Location icon -->
  <g transform="translate(100, 100)">
    <path d="M25 10 C25 4.5 20.5 0 15 0 C9.5 0 5 4.5 5 10 C5 17.5 15 30 15 30 S25 17.5 25 10 Z" fill="white"/>
    <circle cx="15" cy="10" r="5" fill="#E51E2E"/>
  </g>
  
  <!-- Main title -->
  <text x="400" y="120" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle">
    호치민에서 만나요!
  </text>
  
  <!-- English subtitle -->
  <text x="400" y="155" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.9">
    Meet us in Ho Chi Minh City!
  </text>
  
  <!-- Venue info -->
  <g transform="translate(200, 200)">
    <rect x="0" y="0" width="400" height="120" rx="15" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
    
    <!-- Venue details -->
    <text x="200" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">
      📍 Saigon Sports Complex
    </text>
    
    <text x="200" y="55" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.9">
      호치민시 7군 스포츠 센터
    </text>
    
    <text x="200" y="80" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.9">
      🗓️ 2024년 12월 1일 (토) 오전 8시
    </text>
    
    <text x="200" y="105" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.9">
      💰 참가비 200,000₫
    </text>
  </g>
  
  <!-- Registration CTA -->
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">
    🎯 지금 바로 참가 신청하세요!
  </text>
  
  <!-- Decorative badminton elements -->
  <g transform="translate(650, 150)">
    <!-- Shuttlecock -->
    <ellipse cx="0" cy="0" rx="6" ry="12" fill="white"/>
    <path d="M-6 -12 L0 -20 L6 -12 Z" fill="white"/>
    <path d="M-8 -12 L0 -25 L8 -12 Z" fill="none" stroke="white" stroke-width="1"/>
  </g>
  
  <g transform="translate(680, 280)">
    <!-- Small racket -->
    <ellipse cx="0" cy="0" rx="15" ry="20" fill="none" stroke="white" stroke-width="2"/>
    <line x1="0" y1="20" x2="0" y2="35" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Vietnam flag star -->
  <g transform="translate(50, 200)">
    <path d="M0 -15 L4 -5 L15 -5 L7 2 L10 12 L0 6 L-10 12 L-7 2 L-15 -5 L-4 -5 Z" fill="#FFDD00" opacity="0.8"/>
  </g>
</svg>