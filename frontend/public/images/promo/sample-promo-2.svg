<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="spotlightGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3);stop-opacity:1" />
      <stop offset="70%" style="stop-color:rgba(255,255,255,0.1);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGradient2)"/>
  
  <!-- Spotlight effect -->
  <ellipse cx="400" cy="120" rx="300" ry="200" fill="url(#spotlightGradient)"/>
  
  <!-- Trophy -->
  <g transform="translate(350, 80)">
    <!-- Cup body -->
    <path d="M20 40 L20 80 Q20 90 30 90 L70 90 Q80 90 80 80 L80 40 Z" fill="#FFD700"/>
    <!-- Cup handles -->
    <ellipse cx="10" cy="55" rx="8" ry="15" fill="none" stroke="#FFD700" stroke-width="4"/>
    <ellipse cx="90" cy="55" rx="8" ry="15" fill="none" stroke="#FFD700" stroke-width="4"/>
    <!-- Cup base -->
    <rect x="15" y="90" width="70" height="15" fill="#B8860B"/>
    <rect x="10" y="105" width="80" height="8" fill="#B8860B"/>
    <!-- Cup top -->
    <ellipse cx="50" cy="40" rx="30" ry="6" fill="#FFD700"/>
  </g>
  
  <!-- Prize text -->
  <text x="400" y="60" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">
    총 상금 50,000,000₫
  </text>
  
  <!-- Main title -->
  <text x="400" y="220" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">
    MIIRACER SPORTS SCORE
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="250" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle" opacity="0.9">
    실시간 스코어 관리 시스템
  </text>
  
  <!-- Features -->
  <g transform="translate(150, 280)">
    <circle cx="0" cy="0" r="3" fill="white"/>
    <text x="15" y="5" font-family="Arial, sans-serif" font-size="16" fill="white">실시간 경기 결과</text>
    
    <circle cx="150" cy="0" r="3" fill="white"/>
    <text x="165" y="5" font-family="Arial, sans-serif" font-size="16" fill="white">자동 대진표 생성</text>
    
    <circle cx="320" cy="0" r="3" fill="white"/>
    <text x="335" y="5" font-family="Arial, sans-serif" font-size="16" fill="white">선수 통계 분석</text>
  </g>
  
  <!-- Bottom text -->
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" opacity="0.8">
    A조 · B조 · C조 전 등급 참가 가능
  </text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="20" fill="rgba(255,255,255,0.1)"/>
  <circle cx="700" cy="80" r="15" fill="rgba(255,255,255,0.1)"/>
  <circle cx="750" cy="200" r="25" fill="rgba(255,255,255,0.1)"/>
  <circle cx="50" cy="300" r="18" fill="rgba(255,255,255,0.1)"/>
</svg>