<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E51E2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4558;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="courtGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGradient)"/>
  
  <!-- Court Background -->
  <rect x="50" y="50" width="700" height="300" rx="20" fill="url(#courtGradient)"/>
  
  <!-- Court Lines -->
  <rect x="70" y="70" width="660" height="260" rx="10" fill="none" stroke="white" stroke-width="3"/>
  <line x1="400" y1="70" x2="400" y2="330" stroke="white" stroke-width="2"/>
  <line x1="70" y1="200" x2="730" y2="200" stroke="white" stroke-width="2"/>
  
  <!-- Net -->
  <rect x="390" y="70" width="20" height="260" fill="white" opacity="0.8"/>
  
  <!-- Badminton Racket -->
  <ellipse cx="300" cy="150" rx="40" ry="60" fill="none" stroke="white" stroke-width="4"/>
  <ellipse cx="300" cy="150" rx="25" ry="40" fill="none" stroke="white" stroke-width="2"/>
  <line x1="300" y1="210" x2="300" y2="280" stroke="white" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Shuttlecock -->
  <ellipse cx="500" cy="120" rx="8" ry="15" fill="white"/>
  <path d="M492 105 L500 90 L508 105 Z" fill="white"/>
  
  <!-- Title -->
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">
    2024 MIIRACER BADMINTON CHAMPIONSHIP
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" opacity="0.9">
    베트남 호치민 최대 규모의 배드민턴 토너먼트
  </text>
  
  <!-- Logo placeholder -->
  <circle cx="650" cy="100" r="30" fill="rgba(255,255,255,0.2)"/>
  <text x="650" y="105" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">M</text>
</svg>